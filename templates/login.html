{% extends "base.html" %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card card animate-fade-in-up">
        <div class="text-center mb-4">
            <div class="bg-primary-subtle d-inline-flex p-3 rounded-circle mb-3">
                <i data-lucide="lock" class="text-primary"></i>
            </div>
            <h3 class="fw-bold">Welcome Back</h3>
            <p class="text-muted">Sign in to manage your health</p>
        </div>
        
        <form method="post" action="{{ url_for('auth.login') }}">
            <div class="mb-3">
                <label class="form-label fw-medium">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i data-lucide="mail" class="lucide-sm text-muted"></i></span>
                    <input type="email" name="email" class="form-control border-start-0" placeholder="name@example.com" required>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-medium">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i data-lucide="key" class="lucide-sm text-muted"></i></span>
                    <input type="password" name="password" class="form-control border-start-0" placeholder="••••••••" required>
                </div>
            </div>
            <button class="btn btn-primary w-100 py-2 fw-bold">
                Sign In <i data-lucide="log-in" class="ms-1 lucide-sm"></i>
            </button>
        </form>
        
        <div class="text-center mt-4">
            <p class="mb-0 text-muted">Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-primary fw-semibold text-decoration-none">Register here</a></p>
        </div>
    </div>
</div>
{% endblock %}
